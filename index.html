<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
  background: #f5efe6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Georgia, serif;
  margin: 0;
}

#envelope {
  width: 650px;
  height: 450px;
  background: #d8b4a0;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  border-radius: 12px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.2);

#choices{
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  width:650px;
  height:450px;
  background:#d8b4a0;
  border-radius:12px;
  box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

#choices h1{
  color:white;
  font-size:45px;
  margin-bottom:40px;
}

.choice-btn{
  width:300px;
  padding:20px;
  margin:15px;
  font-size:28px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:white;
  color:#8b5e4a;
  transition:0.3s;
}

.choice-btn:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<script>
var password = prompt("Enter password");

if (password !== "31/1/2026") {
  window.location.href = "access-denied.html";
}
</script>

<div id="envelope" onclick="openEnvelope()">
  💌 Open Envelope
</div>
<div id="choices" style="display:none; text-align:center;">

  <h1>Choose a page</h1>

  <button onclick="window.location.href='letter1.html'">
    💌 What I've already said
  </button>

  <br><br>

  <button onclick="window.location.href='letter2.html'">
    ✨ If we meet again
  </button>



<script>
function openEnvelope(){

  // hide envelope
  document.getElementById("envelope").style.display="none";

  // show choices
  document.getElementById("choices").style.display="block";
}
</script>

</body>
</html>
