<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
  background: #f5efe6;
  font-family: Georgia, serif;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
  
#envelope {
  width: 650px;
  height: 450px;
  background: #d8b4a0;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  border-radius: 12px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.2);

#choices{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:#d8b4a0;

  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  z-index:999;
}

#choices h1{
  color:white;
  font-size:45px;
  margin-bottom:40px;
}

.choice-btn{
  width:420px;
  padding:25px;
  margin:20px;
  font-size:32px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  background:white;
  color:#8b5e4a;
  transition:0.3s;
}

.choice-btn:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<script>
var password = prompt("Enter password");

if (password !== "31/1/2026") {
  window.location.href = "access-denied.html";
}
</script>

<div id="envelope" onclick="openEnvelope()">
  💌 Open Envelope
</div>

<div id="choices">
  <h1>Choose a page</h1>

  <button class="choice-btn" onclick="window.location.href='letter1.html'">
    💌 First letter
  </button>

  <button class="choice-btn" onclick="window.location.href='letter2.html'">
    ✨ Yet another
  </button>
</div>

<script>
function openEnvelope(){

  // hide envelope
  document.getElementById("envelope").style.display="none";

  // show choices
  document.getElementById("choices").style.display="flex";
}
</script>
  
</body>
</html>
