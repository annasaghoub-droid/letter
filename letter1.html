<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>First Letter</title>

<style>
body{
  background:#f5efe6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  font-family:Georgia, serif;
}

#letter{
  max-width:800px;
  background:white;
  padding:50px;
  border-radius:12px;
  font-size:34px;
  text-align:right;
  direction:rtl;
  line-height:1.9;
  white-space: pre-line;

}
</style>
</head>

<body>

</div>
<div id="letter">

<h2>For you <3</h2>

<div id="letterText"></div>

<audio id="music" loop>
  <source src="Promise.mp3" type="audio/mpeg">
</audio>

</div>
  
<script>
window.onload = function () {
  document.getElementById("music").play();
}
</script>

<script>
const text = `عزيزي يحيى،

لم تكن لحظة واحدة حين قررت الكتابة عنك، لقد كنت تجول في خاطري منذ رأيتك لأول مرة.
لازلت ابحث عن وجهك بين الوجوه، وعن اسمك بين الأسماء، وعن صوتك الذي بقي عالقاً في رأسي مثل أغنية لا أعرف كلماتها.

رائع أني عرفتك! ولو كان لقاؤنا هو نفسه الوداع.
يكفيني الآن أننا نقطن كوكباً واحداً وتشرق علينا شمس واحدة.

أيها الغريب، كيف لك أن تملأ قلبي بكل هذه السعادة.

مع حبي،
آنا.`;

let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("letterText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 40); // speed (lower = faster)
  }
}

window.onload = function () {
  typeWriter();
  document.getElementById("music").play();
};
</script>

</body>
</html>
