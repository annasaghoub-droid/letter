<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>First Letter</title>

<style>
body{
  background:#f5efe6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  font-family:Georgia, serif;
}

#letter{
  max-width:800px;
  background:white;
  padding:50px;
  border-radius:12px;
  font-size:40px;
  text-align:right;
  direction:rtl;
  line-height:1.9;
  white-space: pre-line;

}
</style>
</head>

<body>

</div>
<div id="letter">

<h2>For you <3</h2>

<div id="letterText"></div>

<audio id="music" loop>
  <source src="Promise.mp3" type="audio/mpeg">
</audio>

</div>
  

<script>
const text = `عزيزي يحيى،
لم تكن لحظة واحدة حين قررت الكتابة عنك، لقد كنت تجول في خاطري منذ رأيتك لأول مرة. لازالت ابحث عن وجهك بين الوجوه، وعن أسمك بين الأسامي، وعن صوتك الذي بقي  عالقاً في رأسي مثل أغنية لا أعرف كلماتها.
رائع أني عرفتك! ولو كان لقائنا هو نفسه الوداع. يكفيني الآن أننا نقطن كوكباً واحداً وتشرق علينا شمس واحدة. أيها الغريب، كيف لك أن تملأ قلبي بكل هذه السعادة. رائع أني عرفتك!
لدي الكثير لأقوله لك، لقد كنت بداخلي طوال الوقت، في خيالي، في بدني، في يديّ، و وددت لو أنني أستطيع الاحتفاظ بك إلى الأبد. 
لست أدري ان كان قدر آخر سيجمعنا، ولكنني متأكدة من شيء واحد على الأقل، هو أثرك في نفسي. أيها الغريب، إن لي قدرة لم امتلك مثلها من قبل على تصوّرك ورؤيتك، أنا لم أفقد صوابي بك بعد، ولذلك فأنا أملك الجرأة لاقول كل هذا لك، كل ما بداخلي يريدك بشراهة، أرغب بك كثيراً، ولو تعلم كم تزعجني هذه المسافة التي نالت منّا. 
ليتك تكون معي، تأكل معي، تجلس معي، تغفو وتصحو معي. أتخيلك دائماً تمشي معي، وحين أرى مشهداً او تخطر ببالي فكرة، أريدك بجانبي، واقفاً إلى جواري ويدك في يدي. 
اكتب إليك وانا على يقين بأن هذه الكلمات لن تعني لك ما تعنيه لي، ولكن لا مفر من كتابتها، فقد همت فيك وفاض الشوق بقلبي وأفكاري وأغرقها. 
انت لست لي، ولن تكون أبداً، لكنني لازلت أرغب بك كثيراً. أفكر فيك باستمرار، ابق كما انت، او كما رسمتك في خيالي. ليتك تعرف كم أحزن لعدم اجتماعنا في صورة أو حتى في أمنية. آسفة فقط لأن الحياه لم تمنحي الفرصة لتقبيل عينيك واحتضانك، آسفة لكل الأشياء التي كان بالإمكان ان نقوم بها سوياً، ولم نفعل. ابق كما انت، وسأبقى كما أنا، أريدك جداً. 

مع حبي،
آنا.`;

let i = 0;

function typeWriter() {

  if (i < text.length) {

    document.getElementById("letterText").innerHTML += text.charAt(i);

    i++;

    setTimeout(typeWriter, 40);

  }

}

function startMusic() {

  const music = document.getElementById("music");

  music.currentTime = 0;

  const playPromise = music.play();

  if (playPromise !== undefined) {

    playPromise.catch(() => {

      document.body.addEventListener("click", () => {

        music.play();

      }, { once: true });

    });

  }

}

window.onload = function () {

  startMusic();

  typeWriter();

};

</script>

</body>
</html>
